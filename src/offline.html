<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>EstimaFood Print — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f;
      color: #e4e4e7;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 16px;
      padding: 40px;
      width: 420px;
      text-align: center;
    }
    .icon { font-size: 48px; margin-bottom: 12px; }
    h1 { font-size: 20px; margin-bottom: 8px; }
    p { font-size: 13px; color: #71717a; margin-bottom: 24px; line-height: 1.6; }
    .btn {
      padding: 12px 28px;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin: 0 6px;
    }
    .btn:hover { background: #2563eb; }
    .btn-outline {
      background: transparent;
      border: 1px solid #3f3f46;
      color: #a1a1aa;
    }
    .btn-outline:hover { background: #27272a; }
    .url { font-size: 11px; color: #52525b; margin-top: 18px; word-break: break-all; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>Sem conexão</h1>
    <p>Não foi possível conectar ao servidor.<br>Verifique sua internet e tente novamente.</p>
    <button class="btn" onclick="location.reload()">🔄 Tentar novamente</button>
    <button class="btn btn-outline" onclick="resetUrl()">⚙️ Trocar URL</button>
    <div class="url" id="url"></div>
  </div>
  <script>
    (async () => {
      if (window.ElectronPrint) {
        const url = await window.ElectronPrint.getServerUrl();
        document.getElementById('url').textContent = url || '';
      }
    })();
    async function resetUrl() {
      if (window.ElectronPrint) {
        await window.ElectronPrint.setServerUrl('');
        await window.ElectronPrint.restart();
      }
    }
  </script>
</body>
</html>
